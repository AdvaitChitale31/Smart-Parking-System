<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Parking Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  margin-top: 30px;
  font-size: 2.5rem;
  letter-spacing: 2px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00f7ff; }
  to { text-shadow: 0 0 25px #00f7ff, 0 0 40px #00f7ff; }
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 120px);
  gap: 25px;
  justify-content: center;
  margin-top: 50px;
}

.slot {
  height: 120px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.3s ease;
  cursor: pointer;
  position: relative;
  font-weight: bold;
}

.slot:hover {
  transform: scale(1.1);
}

.free {
  background: rgba(46, 204, 113, 0.2);
  border: 2px solid #2ecc71;
  box-shadow: 0 0 15px #2ecc71;
}

.occupied {
  background: rgba(231, 76, 60, 0.2);
  border: 2px solid #e74c3c;
  box-shadow: 0 0 15px #e74c3c;
}

.slot span {
  font-size: 0.8rem;
  opacity: 0.8;
}

.tooltip {
  position: absolute;
  bottom: -30px;
  background: black;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.7rem;
  display: none;
}

.slot:hover .tooltip {
  display: block;
}

.footer {
  margin-top: 50px;
  opacity: 0.6;
  font-size: 0.9rem;
}

</style>
</head>

<body>

<h1>🚗 SMART PARKING SYSTEM</h1>

<div class="grid" id="grid"></div>

<div class="footer">Live Sync with C++ Backend ⚡</div>

<script>
function loadData() {
  fetch('data.txt')
    .then(res => res.text())
    .then(data => {
      const lines = data.trim().split('\n');
      const grid = document.getElementById('grid');
      grid.innerHTML = "";

      lines.forEach(line => {
        const parts = line.split(" ");
        const slotID = parts[0];

        let status = "";
        let vehicle = "";

        if (parts.length === 3) {
          vehicle = parts[1];
          status = "Occupied";
        } else {
          status = "Empty";
        }

        const div = document.createElement("div");
        div.classList.add("slot");

        if (status === "Occupied") {
          div.classList.add("occupied");
          div.innerHTML = `
            ${slotID}
            <span>🚗 Occupied</span>
            <div class="tooltip">${vehicle}</div>
          `;
        } else {
          div.classList.add("free");
          div.innerHTML = `
            ${slotID}
            <span>Free</span>
          `;
        }

        grid.appendChild(div);
      });
    });
}

// Refresh every 2 sec
setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
